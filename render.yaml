services:
  - type: web
    name: deepfake-main-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: CORS_ORIGINS
        sync: false
